# ============================================
# NGINX CONFIGURATION FOR SPA (Single Page Applications)
# REUSABLE FOR: React Router, Vue Router, Angular, Svelte routing
# ============================================
# Purpose: Handles client-side routing by serving index.html for all routes
# Usage: Works as-is for most SPAs, no customization needed
# ============================================

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: serve index.html for all routes that don't match files
  # This allows React Router (or other client routers) to handle the routing
  location / {
    try_files $uri /index.html;
  }
}
